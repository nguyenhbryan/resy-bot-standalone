services:
  backend:
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    environment:
      CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
      DATABASE_URL: sqlite:////data/resy-bot.db
      APP_TIMEZONE: America/New_York
    ports:
      - "8000:8000"
    volumes:
      - backend_data:/data

  frontend:
    build:
      context: ./frontend
    env_file:
      - ./frontend/.env
    environment:
      FASTAPI_URL: http://backend:8000
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  backend_data:
